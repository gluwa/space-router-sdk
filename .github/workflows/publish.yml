name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish-sdk:
    name: Publish Python SDK
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: sdk/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-cli:
    name: Publish CLI
    needs: [test, publish-sdk]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: cli
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  publish-npm:
    name: Publish JS SDK to npm
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
        working-directory: sdk/js
      - run: npm run build
        working-directory: sdk/js
      - name: Publish (rc tag for prereleases, latest for stable)
        working-directory: sdk/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [[ "$VERSION" == *-* ]]; then TAG=rc; else TAG=latest; fi
          echo "Publishing $VERSION under dist-tag '$TAG'"
          npm publish --provenance --access public --tag "$TAG"
